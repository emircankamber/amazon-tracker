<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Amazon Rakip Fiyat Takip</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0f1117; --bg2: #1a1d27; --bg3: #222536;
    --border: rgba(255,255,255,0.08); --border2: rgba(255,255,255,0.14);
    --text: #e8eaf0; --muted: #7c8099; --hint: #4a4e63;
    --green: #22c55e; --green-bg: rgba(34,197,94,0.12);
    --red: #ef4444; --red-bg: rgba(239,68,68,0.12);
    --blue: #3b82f6; --blue-bg: rgba(59,130,246,0.1);
    --radius: 10px; --radius-sm: 6px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; font-size: 14px; min-height: 100vh; }
  .topbar { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 14px 24px; display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap; position: sticky; top: 0; z-index: 10; }
  .topbar-left { display: flex; align-items: center; gap: 12px; }
  .logo { font-size: 15px; font-weight: 600; letter-spacing: -0.3px; }
  .logo span { color: var(--blue); }
  .badge { font-size: 11px; padding: 3px 8px; border-radius: 20px; font-weight: 500; }
  .badge.live { background: rgba(34,197,94,0.15); color: var(--green); }
  .badge.demo { background: rgba(251,191,36,0.15); color: #fbbf24; }
  .topbar-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .btn { height: 32px; padding: 0 14px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; white-space: nowrap; transition: background 0.15s; }
  .btn:hover { background: var(--bg3); }
  .btn.primary { background: var(--blue); border-color: var(--blue); color: #fff; }
  .btn.primary:hover { opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .countdown { font-size: 12px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .ticker { background: var(--bg2); border-bottom: 1px solid var(--border); padding: 7px 24px; display: flex; gap: 20px; overflow-x: auto; font-size: 12px; }
  .ticker::-webkit-scrollbar { display: none; }
  .ticker-item { white-space: nowrap; display: flex; align-items: center; gap: 5px; }
  .ticker-item .t-asin { color: var(--muted); font-family: monospace; }
  .ticker-item .t-price { font-weight: 600; }
  .ticker-item .t-dir.up { color: var(--green); }
  .ticker-item .t-dir.down { color: var(--red); }
  .ticker-item .t-dir.flat { color: var(--muted); }
  main { padding: 20px 24px; max-width: 1400px; margin: 0 auto; }
  .stats-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; margin-bottom: 20px; }
  .stat { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat .s-label { font-size: 11px; color: var(--muted); margin-bottom: 6px; text-transform: uppercase; letter-spacing: 0.5px; }
  .stat .s-val { font-size: 26px; font-weight: 600; }
  .stat .s-sub { font-size: 11px; color: var(--hint); margin-top: 3px; }
  .add-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 16px; }
  .add-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .add-row input, .add-row select { height: 36px; background: var(--bg); border: 1px solid var(--border2); border-radius: var(--radius-sm); color: var(--text); padding: 0 10px; font-size: 13px; outline: none; }
  .add-row input:focus, .add-row select:focus { border-color: var(--blue); }
  .add-row input::placeholder { color: var(--hint); }
  #asinIn { width: 130px; text-transform: uppercase; font-family: monospace; }
  #nameIn { flex: 1; min-width: 140px; }
  #urlIn { flex: 2; min-width: 200px; }
  .filter-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
  .filter-row input, .filter-row select { height: 30px; background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius-sm); color: var(--text); padding: 0 9px; font-size: 12px; outline: none; }
  .filter-row input:focus { border-color: var(--blue); }
  #fSearch { width: 200px; }
  #fSearch::placeholder { color: var(--hint); }
  .row-count { font-size: 12px; color: var(--muted); margin-left: auto; }
  .table-wrap { overflow-x: auto; border: 1px solid var(--border); border-radius: var(--radius); }
  table { width: 100%; border-collapse: collapse; }
  thead th { background: var(--bg2); padding: 10px 14px; text-align: left; font-size: 11px; font-weight: 500; color: var(--muted); border-bottom: 1px solid var(--border); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.4px; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: var(--bg2); }
  tbody td { padding: 10px 14px; white-space: nowrap; }
  .asin-link { font-family: monospace; font-size: 12px; color: var(--blue); text-decoration: none; }
  .asin-link:hover { text-decoration: underline; }
  .price-now { font-size: 15px; font-weight: 600; }
  .price-prev { font-size: 13px; color: var(--muted); }
  .chg { display: inline-flex; align-items: center; gap: 4px; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: 500; }
  .chg.up   { background: var(--green-bg); color: var(--green); }
  .chg.down { background: var(--red-bg);   color: var(--red); }
  .chg.flat { background: var(--bg3);      color: var(--muted); }
  .sparkwrap { cursor: pointer; }
  .blink-row-up   { animation: blinkUp   1.5s; }
  .blink-row-down { animation: blinkDown 1.5s; }
  @keyframes blinkUp   { 0%,100%{background:transparent} 40%{background:rgba(34,197,94,0.15)} }
  @keyframes blinkDown { 0%,100%{background:transparent} 40%{background:rgba(239,68,68,0.15)} }
  .del-btn { height: 26px; padding: 0 8px; border-radius: 4px; border: 1px solid transparent; background: transparent; color: var(--hint); font-size: 16px; cursor: pointer; line-height: 1; }
  .del-btn:hover { border-color: var(--red); color: var(--red); background: var(--red-bg); }
  .empty-state { text-align: center; padding: 48px 20px; color: var(--muted); }
  .empty-state p { margin-top: 8px; font-size: 13px; }
  .modal-bg { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.65); z-index: 100; align-items: center; justify-content: center; }
  .modal-bg.open { display: flex; }
  .modal { background: var(--bg2); border: 1px solid var(--border2); border-radius: 14px; padding: 20px; width: min(580px, 94vw); max-height: 88vh; overflow-y: auto; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .modal-head h2 { font-size: 15px; font-weight: 600; }
  .modal-close { background: none; border: none; color: var(--muted); font-size: 18px; cursor: pointer; }
  .modal-close:hover { color: var(--text); }
  .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%); background: var(--bg3); border: 1px solid var(--border2); border-radius: var(--radius); padding: 10px 20px; font-size: 13px; z-index: 999; pointer-events: none; opacity: 0; transition: opacity 0.2s; }
  .toast.show { opacity: 1; }
  @media (max-width: 640px) {
    .stats-row { grid-template-columns: 1fr 1fr; }
    main { padding: 14px; }
    .topbar { padding: 12px 14px; }
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">Amazon <span>Fiyat</span> Takip</div>
    <span id="apiBadge" class="badge demo">● Demo</span>
  </div>
  <div class="topbar-right">
    <span class="countdown" id="cdLabel"></span>
    <button class="btn" onclick="exportCSV()">↓ CSV</button>
    <button class="btn primary" id="checkBtn" onclick="checkNow()">▶ Şimdi Kontrol Et</button>
  </div>
</div>

<div class="ticker" id="ticker"></div>

<main>
  <div class="stats-row">
    <div class="stat"><div class="s-label">Takip</div><div class="s-val" id="stTotal">—</div><div class="s-sub">toplam ASIN</div></div>
    <div class="stat"><div class="s-label">Arttı</div><div class="s-val" id="stUp" style="color:var(--green)">—</div><div class="s-sub">son kontrol</div></div>
    <div class="stat"><div class="s-label">Düştü</div><div class="s-val" id="stDown" style="color:var(--red)">—</div><div class="s-sub">son kontrol</div></div>
    <div class="stat"><div class="s-label">Değişmedi</div><div class="s-val" id="stSame">—</div><div class="s-sub">son kontrol</div></div>
  </div>

  <div class="add-section">
    <div class="add-row">
      <input id="asinIn" placeholder="B08N5WRWNW" maxlength="10" />
      <input id="nameIn" placeholder="Ürün adı" />
      <input id="urlIn" placeholder="veya Amazon URL yapıştır" />
      <select id="mktIn">
        <option value="amazon.com">🇺🇸 US</option>
        <option value="amazon.co.uk">🇬🇧 UK</option>
        <option value="amazon.fr">🇫🇷 FR</option>
        <option value="amazon.de">🇩🇪 DE</option>
      </select>
      <button class="btn primary" onclick="addASIN()">+ Ekle</button>
    </div>
  </div>

  <div class="filter-row">
    <input id="fSearch" placeholder="ASIN veya isim ara..." oninput="render()" />
    <select id="fDir" onchange="render()">
      <option value="all">Tümü</option>
      <option value="up">▲ Arttı</option>
      <option value="down">▼ Düştü</option>
      <option value="flat">— Değişmedi</option>
    </select>
    <span class="row-count" id="rowCount"></span>
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>ASIN</th><th>Ürün</th><th>Pazar</th>
          <th>Şu An</th><th>Önceki</th><th>Değişim</th>
          <th>7g Min/Max</th><th>Grafik</th><th>Güncelleme</th><th></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</main>

<div class="modal-bg" id="chartModal">
  <div class="modal">
    <div class="modal-head">
      <h2 id="chartTitle">Fiyat Geçmişi</h2>
      <button class="modal-close" onclick="closeChart()">✕</button>
    </div>
    <div style="position:relative;height:260px"><canvas id="hChart"></canvas></div>
    <p style="font-size:11px;color:var(--muted);text-align:center;margin-top:10px" id="chartSub"></p>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let data = [];
let statusInfo = {};
let hChartInst = null;
let cdInterval = null;
let nextCheck = null;

async function api(path, opts = {}) {
  const r = await fetch(path, { headers: {'Content-Type':'application/json'}, ...opts });
  if (!r.ok) { const e = await r.json().catch(()=>({})); throw new Error(e.detail || r.status); }
  return r.json();
}

async function load() {
  try {
    [data, statusInfo] = await Promise.all([api('/api/asins'), api('/api/status')]);
    updateBadge();
    render();
    updateStats();
    updateTicker();
    scheduleCountdown();
  } catch(e) { toast('Bağlantı hatası: ' + e.message, true); }
}

function updateBadge() {
  const b = document.getElementById('apiBadge');
  if (statusInfo.keepa_configured) {
    b.textContent = '● Keepa API'; b.className = 'badge live';
  } else {
    b.textContent = '● Demo'; b.className = 'badge demo';
  }
}

function scheduleCountdown() {
  if (cdInterval) clearInterval(cdInterval);
  if (!statusInfo.last_check || !statusInfo.interval_minutes) return;
  const last = new Date(statusInfo.last_check);
  nextCheck = new Date(last.getTime() + statusInfo.interval_minutes * 60000);
  cdInterval = setInterval(() => {
    const left = Math.max(0, nextCheck - Date.now());
    const m = Math.floor(left / 60000);
    const s = Math.floor((left % 60000) / 1000);
    document.getElementById('cdLabel').textContent =
      left > 0 ? `Sonraki: ${m}d ${String(s).padStart(2,'0')}s` : 'Kontrol ediliyor...';
  }, 1000);
}

function extractASIN(v) {
  v = v.trim().toUpperCase();
  const m = v.match(/\/([A-Z0-9]{10})(?:[/?]|$)/);
  if (m) return m[1];
  if (/^[A-Z0-9]{10}$/.test(v)) return v;
  return null;
}

async function addASIN() {
  const asin = extractASIN(document.getElementById('asinIn').value) ||
               extractASIN(document.getElementById('urlIn').value);
  if (!asin) { toast('Geçerli ASIN veya URL gir', true); return; }
  const name   = document.getElementById('nameIn').value.trim() || 'Rakip Ürün';
  const market = document.getElementById('mktIn').value;
  try {
    const res = await api('/api/asins', { method:'POST', body: JSON.stringify({asin, name, market}) });
    toast(`${asin} eklendi ${res.price ? '→ ' + res.price : ''}`);
    document.getElementById('asinIn').value = '';
    document.getElementById('nameIn').value = '';
    document.getElementById('urlIn').value = '';
    await load();
  } catch(e) { toast(e.message, true); }
}

async function deleteASIN(asin) {
  if (!confirm(`${asin} silinsin mi?`)) return;
  await api(`/api/asins/${asin}`, { method:'DELETE' });
  await load();
}

async function checkNow() {
  const btn = document.getElementById('checkBtn');
  btn.disabled = true; btn.textContent = '⟳ Kontrol...';
  try {
    await api('/api/check-now', { method:'POST' });
    toast('Kontrol tamamlandı');
    await load();
  } catch(e) { toast(e.message, true); }
  btn.disabled = false; btn.textContent = '▶ Şimdi Kontrol Et';
}

function exportCSV() { window.open('/api/export-csv'); }

function dir(a) {
  if (a.price === null || a.prev === null) return 'flat';
  return a.price > a.prev ? 'up' : a.price < a.prev ? 'down' : 'flat';
}

function chgBadge(a) {
  const d = dir(a);
  if (d === 'flat' || a.price === null) return `<span class="chg flat">— değişmedi</span>`;
  const diff = Math.abs(a.price - a.prev).toFixed(2);
  const pct  = Math.abs((a.price - a.prev) / a.prev * 100).toFixed(1);
  const sym  = a.symbol || '$';
  return d === 'up'
    ? `<span class="chg up">▲ ${sym}${diff} (+${pct}%)</span>`
    : `<span class="chg down">▼ ${sym}${diff} (−${pct}%)</span>`;
}

function sparkSVG(history, d) {
  const w=64, h=26, p=3;
  if (!history || history.length < 2) return '<svg width="64" height="26"></svg>';
  const min = Math.min(...history), max = Math.max(...history), range = max - min || 1;
  const pts = history.map((v,i) => {
    const x = p + (i/(history.length-1))*(w-p*2);
    const y = h - p - ((v-min)/range)*(h-p*2);
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  const col = d==='up' ? '#22c55e' : d==='down' ? '#ef4444' : '#4a4e63';
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}"><polyline points="${pts}" fill="none" stroke="${col}" stroke-width="1.8" stroke-linejoin="round" stroke-linecap="round"/></svg>`;
}

function render() {
  const search = document.getElementById('fSearch').value.toLowerCase();
  const fDir   = document.getElementById('fDir').value;
  const rows   = data.filter(a => {
    if (fDir !== 'all' && dir(a) !== fDir) return false;
    if (search && !a.asin.toLowerCase().includes(search) && !a.name.toLowerCase().includes(search)) return false;
    return true;
  });
  document.getElementById('rowCount').textContent = rows.length + ' ürün';
  const tbody = document.getElementById('tbody');
  if (!rows.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty-state"><div style="font-size:32px">📭</div><p>ASIN bulunamadı. Yukarıdan ekle.</p></div></td></tr>`;
    return;
  }
  tbody.innerHTML = rows.map(a => {
    const d    = dir(a);
    const sym  = a.symbol || '$';
    const min7 = a.history.length ? Math.min(...a.history).toFixed(2) : '—';
    const max7 = a.history.length ? Math.max(...a.history).toFixed(2) : '—';
    const upd  = a.updated ? new Date(a.updated).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'}) : '—';
    return `<tr id="row-${a.asin}" class="">
      <td><a class="asin-link" href="https://${a.market}/dp/${a.asin}" target="_blank">${a.asin}</a></td>
      <td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;color:var(--text)">${a.name}</td>
      <td style="font-size:11px;color:var(--muted)">${a.market.replace('amazon.','').toUpperCase()}</td>
      <td class="price-now">${a.price !== null ? sym + a.price.toFixed(2) : '—'}</td>
      <td class="price-prev">${a.prev !== null ? sym + a.prev.toFixed(2) : '—'}</td>
      <td>${chgBadge(a)}</td>
      <td style="font-size:11px;color:var(--muted)">${sym}${min7} / ${sym}${max7}</td>
      <td class="sparkwrap" onclick="openChart('${a.asin}')" title="Geçmişi gör">${sparkSVG(a.history, d)}</td>
      <td style="font-size:11px;color:var(--hint)">${upd}</td>
      <td><button class="del-btn" onclick="deleteASIN('${a.asin}')">×</button></td>
    </tr>`;
  }).join('');
}

function updateStats() {
  const up   = data.filter(a => dir(a)==='up').length;
  const down = data.filter(a => dir(a)==='down').length;
  document.getElementById('stTotal').textContent = data.length;
  document.getElementById('stUp').textContent    = up;
  document.getElementById('stDown').textContent  = down;
  document.getElementById('stSame').textContent  = data.length - up - down;
}

function updateTicker() {
  document.getElementById('ticker').innerHTML = data.map(a => {
    const d   = dir(a);
    const sym = a.symbol || '$';
    const arr = d==='up' ? '▲' : d==='down' ? '▼' : '—';
    return `<span class="ticker-item">
      <span class="t-asin">${a.asin}</span>
      <span class="t-price">${a.price !== null ? sym+a.price.toFixed(2) : '—'}</span>
      <span class="t-dir ${d}">${arr}</span>
    </span>`;
  }).join('');
}

async function openChart(asin) {
  const a = data.find(x => x.asin === asin);
  if (!a) return;
  document.getElementById('chartTitle').textContent = a.asin + ' — ' + a.name;
  document.getElementById('chartSub').textContent   = a.market;
  document.getElementById('chartModal').classList.add('open');
  let hist = [];
  try { hist = await api(`/api/history/${asin}`); } catch {}
  const labels = hist.map(h => new Date(h.time).toLocaleDateString('tr-TR',{month:'short',day:'numeric',hour:'2-digit',minute:'2-digit'}));
  const prices = hist.map(h => h.price);
  const colors = prices.map((v,i) => i===0 ? '#4a4e63' : v > prices[i-1] ? '#22c55e' : v < prices[i-1] ? '#ef4444' : '#4a4e63');
  if (hChartInst) { hChartInst.destroy(); hChartInst = null; }
  hChartInst = new Chart(document.getElementById('hChart'), {
    type: 'bar',
    data: { labels, datasets: [{ data: prices, backgroundColor: colors, borderRadius: 4, borderSkipped: false }] },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display:false }, tooltip: { callbacks: { label: c => (a.symbol||'$') + c.parsed.y.toFixed(2) } } },
      scales: {
        x: { ticks: { color:'#7c8099', font:{size:10}, maxRotation:45 }, grid:{display:false} },
        y: { ticks: { color:'#7c8099', callback: v => (a.symbol||'$') + v.toFixed(2) }, grid:{color:'rgba(255,255,255,0.05)'} }
      }
    }
  });
}

function closeChart() {
  document.getElementById('chartModal').classList.remove('open');
  if (hChartInst) { hChartInst.destroy(); hChartInst = null; }
}

function toast(msg, err=false) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = err ? 'var(--red)' : 'var(--green)';
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

document.getElementById('chartModal').addEventListener('click', e => {
  if (e.target === document.getElementById('chartModal')) closeChart();
});

load();
setInterval(load, 60000);
</script>
</body>
</html>
